<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Play chess against Stockfish, the world's strongest chess engine. Free, runs entirely in your browser.">
    <title>Chess Engine — Powered by Stockfish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">&#9823;</span>
                <h1>Chess Engine</h1>
                <span class="logo-badge">Stockfish</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="game-layout">
            <!-- Left Panel -->
            <aside class="side-panel left-panel">
                <div class="eval-container glass-panel">
                    <h3>Evaluation</h3>
                    <div class="eval-bar-wrapper">
                        <div class="eval-bar">
                            <div class="eval-fill" id="evalFill"></div>
                        </div>
                        <span class="eval-score" id="evalScore">0.0</span>
                    </div>
                </div>
                <div class="captured-container glass-panel">
                    <h3>Captured</h3>
                    <div class="captured-group">
                        <label>By White</label>
                        <div class="captured-pieces" id="capturedByWhite"></div>
                    </div>
                    <div class="captured-group">
                        <label>By Black</label>
                        <div class="captured-pieces" id="capturedByBlack"></div>
                    </div>
                </div>
            </aside>

            <!-- Center — Chess Board -->
            <section class="board-section">
                <div class="board-status-bar">
                    <span class="turn-indicator" id="turnIndicator">
                        <span class="turn-dot"></span>
                        White to move
                    </span>
                    <span class="game-status" id="gameStatus"></span>
                </div>
                <div class="board-wrapper">
                    <div class="rank-labels" id="rankLabels"></div>
                    <div class="chess-board" id="chessBoard"></div>
                </div>
                <div class="file-labels" id="fileLabels"></div>

                <!-- Promotion Modal -->
                <div class="promotion-modal" id="promotionModal">
                    <div class="promotion-content glass-panel">
                        <h3>Promote pawn to:</h3>
                        <div class="promotion-choices" id="promotionChoices"></div>
                    </div>
                </div>
            </section>

            <!-- Right Panel -->
            <aside class="side-panel right-panel">
                <div class="controls-container glass-panel">
                    <h3>Controls</h3>
                    <div class="control-group">
                        <label for="difficultySelect">Difficulty</label>
                        <select id="difficultySelect" class="control-select">
                            <option value="1">Beginner (~800)</option>
                            <option value="2">Easy (~1200)</option>
                            <option value="3" selected>Medium (~1800)</option>
                            <option value="4">Hard (~2500)</option>
                            <option value="5">Grandmaster (~3500)</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="colorSelect">Play as</label>
                        <select id="colorSelect" class="control-select">
                            <option value="white" selected>White</option>
                            <option value="black">Black</option>
                        </select>
                    </div>
                    <div class="button-row">
                        <button class="btn btn-primary" id="btnNewGame" title="Start a new game">
                            New Game
                        </button>
                        <button class="btn btn-secondary" id="btnUndo" title="Undo last move">
                            Undo
                        </button>
                    </div>
                    <div class="button-row">
                        <button class="btn btn-outline" id="btnFlip" title="Flip the board">
                            Flip
                        </button>
                    </div>
                </div>
                <div class="history-container glass-panel">
                    <h3>Moves</h3>
                    <div class="move-list" id="moveList">
                        <div class="move-placeholder">Play a move to begin...</div>
                    </div>
                </div>
            </aside>
        </main>

        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <p>Stockfish is thinking...</p>
        </div>
    </div>

    <!-- chess.js from CDN for move validation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
